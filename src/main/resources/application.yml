spring:
  application:
    name: document-viewer

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: jdbc:h2:mem:docdb
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  h2:
    console:
      enabled: true

app:
  storage:
    path: ${user.home}/documents
  watermark:
    text: CONFIDENTIAL
